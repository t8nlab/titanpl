name: TitanPl Development Env Testing

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'status/**'

permissions:
  contents: write

jobs:
  titanpl-dev:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - uses: actions/checkout@v4

      # ---------------- SETUP ----------------
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install jq + lsof
        run: sudo apt-get update && sudo apt-get install -y jq lsof curl

      - name: Install Titan CLI
        run: npm install -g @titanpl/cli@latest

      # ---------------- INIT PROJECT ----------------
      - name: Init TitanPl Project
        run: titan init demo -t js

      # ---------------- CONFIG ----------------
      - name: Update tanfig.json
        run: |
          cd demo
          # Ensure all necessary native modules are allowed for testing
          jq '.extensions.allowNative = ["@titanpl/core"]' tanfig.json > temp.json && mv temp.json tanfig.json

      # ---------------- HEALTH ACTION ----------------
      - name: Add Health Action
        run: |
          mkdir -p demo/app/actions
          cat <<'EOF' > demo/app/actions/health.js
          export const health = defineAction((req) => {
            const result = {
              ok: true,
              timestamp: t.time.timestamp(),
              env: {},
              runtime: {},
              tests: {},
              warnings: [],
              failed: []
            };

            // Helper to safely run async tests without swallowing __SUSPEND__
            function runTest(name, fn) {
              try {
                result.tests[name] = false;
                fn();
                result.tests[name] = true;
              } catch (err) {
                if (String(err).includes("__SUSPEND__")) throw err;
                result.failed.push(name);
                result.warnings.push(name + ": " + String(err));
              }
            }

            // -------- DRIFT TEST --------
            let fetchOk = false;
            try {
              const raw = drift(t.fetch("https://dog.ceo/api/breeds/image/random"));
              if (raw && (raw.length > 10 || (raw.body && raw.body.length > 10))) {
                const data = JSON.parse(raw.body || raw);
                fetchOk = (data.status === "success");
              }
            } catch (err) {
              if (String(err).includes("__SUSPEND__")) throw err;
              result.warnings.push("drift-crash: " + String(err));
            }
            result.tests.drift = fetchOk;
            if (!fetchOk && !result.failed.includes("drift")) result.failed.push("drift");

            // -------- ENV + RUNTIME --------
            result.env = {
              platform: t.os.platform(),
              cpus: t.os.cpus(),
              memTotal: t.os.totalMemory(),
              memFree: t.os.freeMemory(),
              pid: t.proc.pid(),
              uptime: t.proc.uptime(),
            };

            runTest("fs", () => {
              t.fs.writeFile("health.tmp", "ok");
              if (t.fs.readFile("health.tmp") !== "ok") throw new Error("FS read mismatch");
              t.fs.remove("health.tmp");
            });

            runTest("crypto", () => {
              if (!t.crypto.hash("sha256", "titan")) throw new Error("Hash failed");
            });

            runTest("buffer", () => {
              if (t.buffer.toBase64("hello").length === 0) throw new Error("Buffer failed");
            });

            runTest("ls", () => {
              t.ls.set("h", "1");
              if (t.ls.get("h") !== "1") throw new Error("LS value mismatch");
            });

            runTest("ls_v8", () => {
              const complex = { date: new Date(), arr: new Uint8Array([1, 2, 3]) };
              const bytes = t.ls.serialize(complex);
              const restored = t.ls.deserialize(bytes);
              if (!restored || restored.arr.length !== 3) throw new Error("V8 Serialization failed");
              
              // British Alias Test
              const bytes2 = t.ls.serialise(complex);
              const restored2 = t.ls.deserialise(bytes2);
               if (!restored2 || restored2.arr.length !== 3) throw new Error("V8 British Alias Serialization failed");
            });
            
            runTest("global_v8", () => {
               const complex = { a: 1 };
               const bytes = t.serialize(complex);
               const restored = t.deserialise(bytes);
               if (!restored || restored.a !== 1) throw new Error("Global V8 Serialization failed");
            });

            result.runtime = {
              pid: t.proc.pid(),
              uptime: t.proc.uptime(),
              memory: t.proc.memory() || {}
            };

            if (result.failed.length > 0) result.ok = false;
            return result;
          });
          EOF

      # ---------------- APP.JS ----------------
      - name: Update routes
        run: |
          cat <<EOF > demo/app/app.js
          import t from "@titanpl/route";
          t.get("/").reply("ok");
          t.get("/h").action("health");
          t.start(5100, "TitanPl dev test", 6);
          EOF

      # ---------------- DEV ----------------
      - name: Dev Run
        continue-on-error: true
        run: |
          cd demo
          titan dev &
          echo "Waiting Titan Dev..."
          READY=false

          for i in {1..180}; do
            if curl -s http://127.0.0.1:5100/ > /dev/null; then
              READY=true
              break
            fi
            sleep 2
          done

          if [ "$READY" = true ]; then
            curl -s http://127.0.0.1:5100/h > ../dev.json || echo '{"ok":false}' > ../dev.json
          else
            echo '{"ok":false,"stage":"dev-timeout"}' > ../dev.json
          fi

          PID=$(lsof -t -i:5100 2>/dev/null)
          [ -n "$PID" ] && kill $PID || true

      # ---------------- BUILD ----------------
      - name: Production Build
        continue-on-error: true
        run: cd demo && titan build || true

      # ---------------- ENSURE JSON ----------------
      - name: Ensure JSON
        if: always()
        run: |
          [ -f dev.json ] || echo '{"ok":false}' > dev.json

      # ---------------- STATUS ----------------
      - name: Prepare Status
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M-%S)
          COMMIT=$(git rev-parse --short HEAD)
          mkdir -p status
          jq -n --arg date "$DATE" --arg commit "$COMMIT" \
          --slurpfile dev dev.json \
          '{date:$date,commit:$commit,dev:$dev[0]}' \
          > status/$DATE-$COMMIT.json

      - name: Commit Status
        if: always()
        run: |
          git config user.name "TitanPl CI"
          git config user.email "ci@titan.local"
          git add status/
          git diff --cached --quiet || (git commit -m "Titan CI Log" && git push)
